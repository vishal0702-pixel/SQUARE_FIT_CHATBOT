name: Deploy Chat

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            cd ~/apps/SQUARE_FIT_CHATBOT

            git fetch origin
            git reset --hard origin/main

            npm install --production

            if pm2 describe squarefit-chat > /dev/null; then
              pm2 restart squarefit-chat
            else
              pm2 start app.js --name squarefit-chat
            fi

            pm2 save